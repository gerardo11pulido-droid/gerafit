<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraFit – Objetivos Inteligentes</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}
header{
  background:#020617;
  padding:20px;
  text-align:center;
}
.card{
  background:#020617;
  margin:15px;
  padding:15px;
  border-radius:14px;
}
h3{ color:#22c55e; margin-top:0; }
button,input,select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:15px;
}
button{
  background:#22c55e;
  font-weight:bold;
}
.exercise{
  border:1px solid #1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
.done{
  background:#14532d;
}
.muscle-btn{
  background:#1e293b;
  margin-bottom:10px;
}
.ad{
  background:#020617;
  border:1px dashed #22c55e;
  text-align:center;
  padding:15px;
  margin:15px;
  border-radius:10px;
}
.progress-bar{
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}
.progress-bar div{
  height:16px;
  background:#22c55e;
}
.stat{
  margin:6px 0;
}
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Entrena con objetivo · Progresa con datos</p>
</header>

<div class="ad">📢 Anuncio</div>

<div class="card">
<h3>🎯 Tu objetivo</h3>
<select id="goal">
  <option value="volumen">Volumen</option>
  <option value="definicion">Definición</option>
</select>
<input id="currentWeight" placeholder="Peso actual (kg)">
<input id="targetWeight" placeholder="Peso objetivo (kg)">
<button onclick="saveProfile()">Guardar objetivo</button>
</div>

<div class="card">
<h3>🏋️ Entrenar hoy</h3>
<button class="muscle-btn" onclick="loadMuscle('pierna')">🦵 Leg Day</button>
<button class="muscle-btn" onclick="loadMuscle('pecho')">🧱 Chest Day</button>
<button class="muscle-btn" onclick="loadMuscle('espalda')">🦍 Back Day</button>
<button class="muscle-btn" onclick="loadMuscle('hombro')">🧠 Shoulder Day</button>
<button class="muscle-btn" onclick="loadMuscle('brazo')">💪 Arms Day</button>
<button class="muscle-btn" onclick="loadMuscle('gluteo')">🍑 Glute Day</button>
</div>

<div id="routine"></div>

<div class="card">
<h3>📊 Estadísticas</h3>
<div class="stat" id="weightStat"></div>
<div class="progress-bar"><div id="progressBar"></div></div>
<div class="stat" id="exerciseStat"></div>
<div class="stat" id="daysStat"></div>
</div>

<div class="ad">📢 Anuncio</div>

<script>
const baseExercises={
  pierna:["Sentadilla","Prensa","Extensión","Curl femoral","Pantorrilla"],
  pecho:["Press banca","Press inclinado","Aperturas","Cross over"],
  espalda:["Jalón","Remo barra","Remo mancuerna","Hiperextensiones"],
  hombro:["Press militar","Laterales","Face pull","Posterior"],
  brazo:["Curl Z","Martillo","Press francés","Jalón cuerda"],
  gluteo:["Hip thrust","Sumo","Patada polea","Abducciones"]
};

let profile=JSON.parse(localStorage.getItem("gerafitProfile"))||{};
let progress=JSON.parse(localStorage.getItem("gerafitProgress"))||{};
let stats=JSON.parse(localStorage.getItem("gerafitStats"))||{exercises:0,days:0};

function saveProfile(){
  profile={
    goal:document.getElementById("goal").value,
    current:+document.getElementById("currentWeight").value,
    target:+document.getElementById("targetWeight").value
  };
  localStorage.setItem("gerafitProfile",JSON.stringify(profile));
  updateStats();
}

function getScheme(){
  if(profile.goal==="volumen"){
    return {reps:"12-10-8-6",rest:"90s"};
  }else{
    return {reps:"15-15-12-12",rest:"45s"};
  }
}

function loadMuscle(muscle){
  const scheme=getScheme();
  const container=document.getElementById("routine");
  container.innerHTML="";
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<h3>${muscle.toUpperCase()} – ${profile.goal||""}</h3>`;

  baseExercises[muscle].forEach(ex=>{
    const key=muscle+"-"+ex;
    const saved=progress[key]||{};
    const div=document.createElement("div");
    div.className="exercise";
    if(saved.done) div.classList.add("done");

    div.innerHTML=`
      <b>${ex}</b><br>
      Reps: ${scheme.reps} | Descanso: ${scheme.rest}
      <input placeholder="Peso usado (kg)" value="${saved.weight||""}">
      <button>${saved.done?"✔ Completado":"Marcar ejercicio"}</button>
    `;

    const input=div.querySelector("input");
    const btn=div.querySelector("button");

    btn.onclick=()=>{
      if(!saved.done){
        stats.exercises++;
        stats.days++;
      }
      progress[key]={done:true,weight:input.value};
      localStorage.setItem("gerafitProgress",JSON.stringify(progress));
      localStorage.setItem("gerafitStats",JSON.stringify(stats));
      loadMuscle(muscle);
      updateStats();
    };

    card.appendChild(div);
  });

  container.appendChild(card);
}

function updateStats(){
  if(!profile.current||!profile.target) return;
  const total=Math.abs(profile.target-profile.current);
  const done=Math.abs(profile.current-profile.target);
  const percent=Math.min(100,Math.round((done/total)*100));

  document.getElementById("weightStat").innerText=
    `Peso: ${profile.current}kg → ${profile.target}kg (${percent}%)`;

  document.getElementById("progressBar").style.width=percent+"%";
  document.getElementById("exerciseStat").innerText=
    `Ejercicios completados: ${stats.exercises}`;
  document.getElementById("daysStat").innerText=
    `Sesiones registradas: ${stats.days}`;
}

updateStats();
</script>

</body>
</html>
