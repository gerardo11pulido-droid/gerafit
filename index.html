<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraFit – Entrena y Progresa</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}
header{
  background:#020617;
  padding:20px;
  text-align:center;
}
.card{
  background:#020617;
  margin:15px;
  padding:15px;
  border-radius:14px;
}
h3{ color:#22c55e; }
button,input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}
button{ background:#22c55e; font-weight:bold; }
.exercise{
  background:#020617;
  border:1px solid #1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
.done{
  background:#14532d;
}
.ad{
  background:#020617;
  border:1px dashed #22c55e;
  text-align:center;
  padding:15px;
  margin:15px;
  border-radius:10px;
}
.day-btn{
  background:#1e293b;
  margin:5px;
}
.day-btn.active{
  background:#22c55e;
  color:#000;
}
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Entrena · Registra · Progresa</p>
</header>

<div class="ad">📢 Anuncio</div>

<div class="card">
<h3>📆 Semana</h3>
<div id="days"></div>
</div>

<div id="routine"></div>

<script>
const week = {
  "Lunes": {name:"Pierna", ex:["Sentadilla","Prensa","Extensión","Curl femoral","Pantorrilla"]},
  "Martes": {name:"Hombro + Brazo", ex:["Press militar","Laterales","Curl Z","Press francés"]},
  "Miércoles": {name:"Pecho + Espalda", ex:["Press inclinado","Aperturas","Jalón","Remo"]},
  "Jueves": {name:"Pierna", ex:["Hack","Búlgara","Zancadas","Curl femoral"]},
  "Viernes": {name:"Hombro + Brazo", ex:["Arnold","Face pull","Martillo","Fondos"]},
  "Sábado": {name:"Pecho + Espalda", ex:["Press banca","Peck fly","Dominadas","Remo barra"]}
};

let progress = JSON.parse(localStorage.getItem("gerafitProgress")) || {};

const daysDiv = document.getElementById("days");
Object.keys(week).forEach(day=>{
  const btn=document.createElement("button");
  btn.innerText=day;
  btn.className="day-btn";
  btn.onclick=()=>loadDay(day);
  daysDiv.appendChild(btn);
});

function loadDay(day){
  document.getElementById("routine").innerHTML="";
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<h3>${day} – ${week[day].name}</h3>`;
  
  week[day].ex.forEach(ex=>{
    const div=document.createElement("div");
    div.className="exercise";
    const key=`${day}-${ex}`;
    const saved=progress[key]||{};
    div.innerHTML=`
      <b>${ex}</b>
      <input placeholder="Peso usado (kg)" value="${saved.weight||""}">
      <button>${saved.done?"✔ Completado":"Marcar ejercicio"}</button>
    `;
    const input=div.querySelector("input");
    const btn=div.querySelector("button");

    if(saved.done) div.classList.add("done");

    btn.onclick=()=>{
      progress[key]={weight:input.value,done:true};
      localStorage.setItem("gerafitProgress",JSON.stringify(progress));
      loadDay(day);
    };
    card.appendChild(div);
  });

  document.getElementById("routine").appendChild(card);
}
</script>

</body>
</html>
