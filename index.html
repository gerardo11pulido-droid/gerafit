<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraFit</title>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;margin:0}
header{background:#020617;padding:20px;text-align:center}
.card{background:#020617;margin:15px;padding:15px;border-radius:14px}
h3{color:#22c55e;margin-top:0}
button,input{width:100%;padding:12px;margin-top:8px;border-radius:10px;border:none}
button{background:#22c55e;font-weight:bold}
.sub{background:#1e293b}
.exercise{border:1px solid #1e293b;padding:10px;border-radius:10px;margin-top:10px}
.done{background:#14532d}
.ad{border:1px dashed #22c55e;margin:15px;padding:15px;text-align:center}
small{color:#94a3b8}
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Entrena inteligente · Progresa real</p>
</header>

<div class="ad">📢 Anuncio</div>

<div class="card">
<h3>🎯 Objetivo</h3>
<button onclick="setGoal('volumen')">Volumen</button>
<button onclick="setGoal('definicion')">Definición</button>
<small id="goalText"></small>
</div>

<div class="card">
<h3>👤 Perfil</h3>
<input id="currentWeight" placeholder="Peso actual (kg)">
<input id="height" placeholder="Estatura (cm)">
<input id="targetWeight" placeholder="Peso objetivo (kg)">
<button onclick="saveProfile()">Guardar</button>
<small id="profileText"></small>
</div>

<div class="card">
<h3>📈 Nivel</h3>
<button onclick="setLevel('novato')">Novato</button>
<button onclick="setLevel('intermedio')">Intermedio</button>
<button onclick="setLevel('avanzado')">Avanzado</button>
<small id="levelText"></small>
</div>

<div class="card">
<h3>🏋️ ¿Qué entrenas hoy?</h3>
<button onclick="selectMuscle('pierna')">Pierna</button>
<button onclick="selectMuscle('pecho')">Pecho</button>
<button onclick="selectMuscle('espalda')">Espalda</button>
<button onclick="selectMuscle('hombro')">Hombro</button>
<button onclick="selectMuscle('brazo')">Brazos</button>
</div>

<div id="subgroups"></div>
<div id="routine"></div>

<div class="ad">📢 Anuncio</div>

<script>
let profile = JSON.parse(localStorage.getItem("gerafitProfile")) || {};
let progress = JSON.parse(localStorage.getItem("gerafitProgress")) || {};

const data = {
  pierna:{
    Cuadriceps:{
      novato:["Prensa","Extensión"],
      intermedio:["Sentadilla","Hack"],
      avanzado:["Sentadilla libre","Sissy"]
    },
    Femoral:{
      novato:["Curl acostado"],
      intermedio:["Curl sentado","Peso muerto"],
      avanzado:["Peso muerto rumano"]
    },
    Gluteo:{
      novato:["Puente"],
      intermedio:["Hip thrust"],
      avanzado:["Hip thrust pesado","Búlgara"]
    },
    Pantorrilla:{
      novato:["Elevaciones de pie"],
      intermedio:["Prensa"],
      avanzado:["Smith"]
    }
  },
  pecho:{
    Superior:{
      novato:["Press inclinado máquina"],
      intermedio:["Press inclinado barra"],
      avanzado:["Press inclinado pesado"]
    },
    Medio:{
      novato:["Press máquina"],
      intermedio:["Press banca"],
      avanzado:["Press banca pesado"]
    }
  },
  espalda:{
    Dorsal:{
      novato:["Jalón"],
      intermedio:["Dominadas asistidas"],
      avanzado:["Dominadas"]
    },
    Media:{
      novato:["Remo máquina"],
      intermedio:["Remo barra"],
      avanzado:["Remo pesado"]
    }
  },
  hombro:{
    Frontal:{
      novato:["Press máquina"],
      intermedio:["Press militar"],
      avanzado:["Press militar barra"]
    },
    Lateral:{
      novato:["Laterales"],
      intermedio:["Laterales inclinadas"],
      avanzado:["Laterales pesadas"]
    }
  },
  brazo:{
    Biceps:{
      novato:["Curl mancuerna"],
      intermedio:["Curl Z"],
      avanzado:["Curl pesado"]
    },
    Triceps:{
      novato:["Jalón cuerda"],
      intermedio:["Press francés"],
      avanzado:["Fondos"]
    }
  }
};

function setGoal(g){
  profile.goal=g;
  localStorage.setItem("gerafitProfile",JSON.stringify(profile));
  goalText.innerText=`Objetivo: ${g}`;
}
function saveProfile(){
  profile.current=currentWeight.value;
  profile.height=height.value;
  profile.target=targetWeight.value;
  localStorage.setItem("gerafitProfile",JSON.stringify(profile));
  profileText.innerText="Perfil guardado ✔";
}
function setLevel(l){
  profile.level=l;
  localStorage.setItem("gerafitProfile",JSON.stringify(profile));
  levelText.innerText=`Nivel: ${l}`;
}
function scheme(){
  return profile.goal==="volumen"
    ? {r:"12-10-8",d:"90s"}
    : {r:"15-12-12",d:"45s"};
}

function selectMuscle(m){
  if(!profile.level||!profile.goal){
    alert("Selecciona objetivo y nivel");
    return;
  }
  subgroups.innerHTML="";
  routine.innerHTML="";
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<h3>${m.toUpperCase()}</h3>`;
  Object.keys(data[m]).forEach(s=>{
    const b=document.createElement("button");
    b.className="sub";
    b.innerText=s;
    b.onclick=()=>loadExercises(m,s);
    card.appendChild(b);
  });
  subgroups.appendChild(card);
}

function loadExercises(m,s){
  routine.innerHTML="";
  const sc=scheme();
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<h3>${s}</h3>`;
  data[m][s][profile.level].forEach(e=>{
    const key=m+s+e;
    const saved=progress[key]||{};
    const div=document.createElement("div");
    div.className="exercise"+(saved.done?" done":"");
    div.innerHTML=`
      <b>${e}</b><br>
      Reps: ${sc.r} | Descanso: ${sc.d}
      <input placeholder="Peso (kg)" value="${saved.w||""}">
      <button>${saved.done?"✔":"Marcar"}</button>`;
    div.querySelector("button").onclick=()=>{
      progress[key]={done:true,w:div.querySelector("input").value};
      localStorage.setItem("gerafitProgress",JSON.stringify(progress));
      loadExercises(m,s);
    };
    card.appendChild(div);
  });
  routine.appendChild(card);
}
</script>

</body>
</html>
