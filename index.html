<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GeraFit – Smart Gym Routines</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}
header{
  background:#020617;
  padding:20px;
  text-align:center;
}
select,button{
  width:90%;
  max-width:360px;
  padding:14px;
  margin:10px auto;
  display:block;
  border-radius:10px;
  border:none;
  font-size:16px;
}
button{
  background:#22c55e;
  font-weight:bold;
}
.card{
  background:#020617;
  margin:15px;
  padding:15px;
  border-radius:14px;
}
.card h3{
  color:#22c55e;
  margin-top:0;
}
.lock{
  opacity:.5;
}
.pro-btn{
  background:#facc15;
  color:#000;
}
footer{
  text-align:center;
  font-size:12px;
  color:#94a3b8;
  margin:20px;
}
small{
  color:#94a3b8;
}
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Smart Training System by Gera</p>
</header>

<select id="mode">
<option value="basic">Rutina General (Gratis)</option>
<option value="pro">GeraFit PRO 🔥</option>
</select>

<select id="goal">
<option value="volume">Volumen</option>
<option value="cut">Definición</option>
<option value="strength">Fuerza</option>
</select>

<select id="level">
<option value="beginner">Principiante</option>
<option value="intermediate">Intermedio</option>
<option value="advanced">Avanzado</option>
</select>

<button onclick="generate()">Generar Rutina</button>

<div id="result"></div>

<footer>
© 2026 GeraFit – All rights reserved
</footer>

<script>
const week = ["A","B","C"][Math.floor(Math.random()*3)];

function generate(){
  const mode=document.getElementById("mode").value;
  const goal=document.getElementById("goal").value;
  const level=document.getElementById("level").value;
  let html="";

  const context={
    volume:"Descanso 60–90s · Duración 6–8 semanas",
    cut:"Descanso 30–45s · Duración 4–6 semanas",
    strength:"Descanso 2–3 min · Duración 6 semanas"
  };

  if(mode==="basic"){
    html=`
    <div class="card">
      <h3>Rutina General</h3>
      <ul>
        <li>Pierna – Sentadilla, Prensa, Extensión</li>
        <li>Pecho – Press banca, Aperturas</li>
        <li>Espalda – Jalón, Remo</li>
        <li>Hombro – Press, Laterales</li>
        <li>Brazo – Curl y Tríceps</li>
      </ul>
      <p class="lock">🔒 Desbloquea PRO para rutinas inteligentes</p>
    </div>`;
  }

  if(mode==="pro"){
    const data={
      volume:{
        pierna:[
          "Triserie: Sentadilla + Extensión + Sissy",
          "Hack 21’s + Desplantes",
          "Curl femoral + PM mancuerna",
          "Pantorrilla Smith + Prensa"
        ],
        upper:[
          "Press militar barra + mancuerna",
          "Arnold + Laterales + Invertidos",
          "Curl Z + Mancuerna + Concentrado",
          "Francés + Patada + Polea"
        ],
        torso:[
          "Press inclinado barra + Mancuerna + Crossover",
          "Cristos + Press plano + Peck fly",
          "Jalón + Remo + Mancuerna",
          "Hiperextensiones"
        ]
      },
      cut:{
        pierna:[
          "Zancadas + Extensión",
          "Circuito Prensa / Curl / Pantorrilla",
          "Isométricos finales"
        ],
        upper:[
          "Press mancuerna + Laterales",
          "Curl polea + Martillo",
          "Jalón cuerda + Fondos"
        ],
        torso:[
          "Press inclinado + Flexiones",
          "Jalón + Remo + Pull over",
          "Cardio 20 min"
        ]
      },
      strength:{
        pierna:[
          "Sentadilla 5x5",
          "Hack squat 4x6",
          "PM rumano 4x6",
          "Pantorrilla pesada"
        ],
        upper:[
          "Press militar 5x5",
          "Curl barra 4x6",
          "Press cerrado 4x6"
        ],
        torso:[
          "Press banca 5x5",
          "Dominadas 4x6",
          "Remo barra 4x6"
        ]
      }
    };

    html+=`
    <div class="card">
      <h3>📆 Semana ${week}</h3>
      <small>${context[goal]} · Nivel ${level}</small>
    </div>

    <div class="card">
      <h3>Lunes / Jueves – Hombro + Brazo</h3>
      <ul>${data[goal].upper.map(e=>`<li>${e}</li>`).join("")}</ul>
    </div>

    <div class="card">
      <h3>Martes / Viernes – Pierna</h3>
      <ul>${data[goal].pierna.map(e=>`<li>${e}</li>`).join("")}</ul>
    </div>

    <div class="card">
      <h3>Miércoles / Sábado – Pecho + Espalda</h3>
      <ul>${data[goal].torso.map(e=>`<li>${e}</li>`).join("")}</ul>
    </div>

    <div class="card">
      <button class="pro-btn">📄 Descargar Rutina PDF</button>
      <small>* Disponible en versión PRO+</small>
    </div>
    `;
  }

  document.getElementById("result").innerHTML=html;
}
</script>

</body>
</html>
