<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraFit – Rutinas Inteligentes</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}
header{
  background:#020617;
  padding:20px;
  text-align:center;
}
select,button{
  width:90%;
  max-width:360px;
  padding:14px;
  margin:10px auto;
  display:block;
  border-radius:10px;
  border:none;
  font-size:16px;
}
button{ background:#22c55e; font-weight:bold; }
.card{
  background:#020617;
  margin:15px;
  padding:15px;
  border-radius:14px;
}
.card h3{ color:#22c55e; margin-top:0; }
small{ color:#94a3b8; }
footer{
  text-align:center;
  font-size:12px;
  color:#94a3b8;
  margin:60px 20px 80px;
}
.ad{
  background:#020617;
  border:1px dashed #22c55e;
  color:#94a3b8;
  text-align:center;
  padding:15px;
  margin:15px;
  border-radius:10px;
}
.ad-bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  margin:0;
  border-radius:0;
}
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Rutinas inteligentes · Gratis · By Gera</p>
</header>

<div class="ad">📢 Anuncio</div>

<select id="goal">
  <option value="volume">Volumen</option>
  <option value="cut">Definición</option>
  <option value="strength">Fuerza</option>
</select>

<select id="level">
  <option value="beginner">Principiante</option>
  <option value="intermediate">Intermedio</option>
  <option value="advanced">Avanzado</option>
</select>

<button onclick="generate()">Generar Rutina</button>

<div id="result"></div>

<div class="ad-bottom">📢 Anuncio</div>

<footer>
© 2026 GeraFit · Gratis · Monetizado con anuncios
</footer>

<script>
const week=["A","B","C"][Math.floor(Math.random()*3)];

function pick(arr,n){
  return arr.sort(()=>0.5-Math.random()).slice(0,n);
}

function generate(){
  const goal=document.getElementById("goal").value;
  const level=document.getElementById("level").value;
  let html="";

  const context={
    volume:"Descanso 60–90s · 6–8 semanas",
    cut:"Descanso 30–45s · 4–6 semanas",
    strength:"Descanso 2–3 min · 6 semanas"
  };

  const bank={
    pierna:[
      "Sentadilla libre","Hack squat","Prensa inclinada","Sentadilla búlgara",
      "Zancadas caminando","Extensión de cuádriceps","Sissy squat",
      "Curl femoral","Curl femoral sentado","Peso muerto rumano",
      "Peso muerto mancuerna","Pantorrilla en prensa","Pantorrilla Smith"
    ],
    hombro:[
      "Press militar barra","Press mancuerna","Arnold press",
      "Elevaciones laterales","Laterales en polea","Flies invertidos",
      "Face pull","Press tras nuca"
    ],
    brazo:[
      "Curl barra Z","Curl mancuerna","Curl martillo","Curl concentrado",
      "Press francés","Jalón cuerda","Fondos","Patada mancuerna"
    ],
    pecho:[
      "Press banca","Press inclinado","Press declinado",
      "Aperturas mancuernas","Cristos en polea","Peck fly","Flexiones"
    ],
    espalda:[
      "Jalón al pecho","Dominadas","Remo barra",
      "Remo mancuerna","Remo en máquina","Pull over polea",
      "Peso muerto","Hiperextensiones"
    ]
  };

  html+=`
  <div class="card">
    <h3>📆 Semana ${week}</h3>
    <small>${context[goal]} · Nivel ${level}</small>
  </div>

  <div class="card">
    <h3>Lunes / Jueves – Hombro + Brazo</h3>
    <ul>
      ${pick(bank.hombro,3).map(e=>`<li>${e}</li>`).join("")}
      ${pick(bank.brazo,3).map(e=>`<li>${e}</li>`).join("")}
    </ul>
  </div>

  <div class="ad">📢 Anuncio</div>

  <div class="card">
    <h3>Martes / Viernes – Pierna</h3>
    <ul>
      ${pick(bank.pierna,5).map(e=>`<li>${e}</li>`).join("")}
    </ul>
  </div>

  <div class="ad">📢 Anuncio</div>

  <div class="card">
    <h3>Miércoles / Sábado – Pecho + Espalda</h3>
    <ul>
      ${pick(bank.pecho,3).map(e=>`<li>${e}</li>`).join("")}
      ${pick(bank.espalda,3).map(e=>`<li>${e}</li>`).join("")}
    </ul>
  </div>
  `;

  document.getElementById("result").innerHTML=html;
}
</script>

</body>
</html>
