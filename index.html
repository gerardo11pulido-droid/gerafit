<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraFit</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
header{background:#020617;padding:20px;text-align:center}
.card{background:#020617;margin:15px;padding:15px;border-radius:14px}
h3{color:#22c55e;margin-top:0}
button,input{
  width:100%;padding:12px;margin-top:8px;
  border-radius:10px;border:none;font-size:15px
}
button{background:#22c55e;font-weight:bold}
.sub{background:#1e293b}
.exercise{
  border:1px solid #1e293b;
  padding:10px;border-radius:10px;margin-top:10px
}
.done{background:#14532d}
small{color:#94a3b8}
.ad{border:1px dashed #22c55e;margin:15px;padding:15px;text-align:center}
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Rutinas PRO por grupo muscular</p>
</header>

<div class="ad">ANUNCIO</div>

<div class="card">
<h3>👤 Perfil</h3>
<input id="peso" placeholder="Peso actual (kg)">
<input id="estatura" placeholder="Estatura (cm)">
<input id="objetivo" placeholder="Peso objetivo (kg)">
<button onclick="guardarPerfil()">Guardar perfil</button>
<small id="perfilTxt"></small>
</div>

<div class="card">
<h3>🎯 Objetivo</h3>
<button onclick="setObjetivo('volumen')">Volumen</button>
<button onclick="setObjetivo('definicion')">Definición</button>
<small id="objTxt"></small>
</div>

<div class="card">
<h3>📈 Nivel</h3>
<button onclick="setNivel('novato')">Novato</button>
<button onclick="setNivel('intermedio')">Intermedio</button>
<button onclick="setNivel('avanzado')">Avanzado</button>
<small id="nivelTxt"></small>
</div>

<div class="card">
<h3>🏋️ Grupo muscular</h3>
<button onclick="grupo('pierna')">Pierna</button>
<button onclick="grupo('pecho')">Pecho</button>
<button onclick="grupo('espalda')">Espalda</button>
<button onclick="grupo('hombro')">Hombro</button>
<button onclick="grupo('brazo')">Brazos</button>
</div>

<div id="sub"></div>
<div id="rutina"></div>

<script>
let perfil = JSON.parse(localStorage.getItem("perfil")) || {};
let progreso = JSON.parse(localStorage.getItem("progreso")) || {};

const data = {
pierna:{
 "Cuádriceps":[
  "Sentadilla libre",
  "Hack squat",
  "Prensa pies cerrados",
  "Sissy squat",
  "Extensión unilateral"
 ],
 "Femoral":[
  "Peso muerto rumano",
  "Curl femoral acostado",
  "Curl sentado",
  "Curl nórdico"
 ],
 "Glúteo":[
  "Hip thrust",
  "Búlgara",
  "Sentadilla sumo",
  "Patada en polea"
 ],
 "Pantorrilla":[
  "Elevaciones de pie",
  "Prensa",
  "Smith",
  "Unilateral"
 ]
},
pecho:{
 "Superior":[
  "Press inclinado barra",
  "Press inclinado mancuerna",
  "Aperturas inclinadas",
  "Press con pausa"
 ],
 "Medio":[
  "Press banca",
  "Press mancuerna",
  "Fondos",
  "Press máquina"
 ]
},
espalda:{
 "Dorsal":[
  "Dominadas",
  "Jalón abierto",
  "Pullover",
  "Jalón cerrado"
 ],
 "Media":[
  "Remo barra",
  "Remo mancuerna",
  "Remo T",
  "Pendlay"
 ]
},
hombro:{
 "Frontal":[
  "Press militar",
  "Push press",
  "Press mancuerna"
 ],
 "Lateral":[
  "Laterales",
  "Laterales inclinadas",
  "Drop sets"
 ]
},
brazo:{
 "Bíceps":[
  "Curl barra",
  "Curl inclinado",
  "Curl araña",
  "21s"
 ],
 "Tríceps":[
  "Fondos",
  "Press francés",
  "Rompecráneos",
  "Extensión polea"
 ]
}
};

function guardarPerfil(){
 perfil.peso=peso.value;
 perfil.estatura=estatura.value;
 perfil.objetivo=objetivo.value;
 localStorage.setItem("perfil",JSON.stringify(perfil));
 perfilTxt.innerText="Perfil guardado ✔";
}

function setObjetivo(o){
 perfil.meta=o;
 localStorage.setItem("perfil",JSON.stringify(perfil));
 objTxt.innerText="Objetivo: "+o;
}

function setNivel(n){
 perfil.nivel=n;
 localStorage.setItem("perfil",JSON.stringify(perfil));
 nivelTxt.innerText="Nivel: "+n;
}

function grupo(g){
 if(!perfil.nivel||!perfil.meta){
  alert("Selecciona objetivo y nivel");
  return;
 }
 sub.innerHTML="";
 rutina.innerHTML="";
 const c=document.createElement("div");
 c.className="card";
 c.innerHTML="<h3>Subgrupo</h3>";
 Object.keys(data[g]).forEach(s=>{
  const b=document.createElement("button");
  b.className="sub";
  b.innerText=s;
  b.onclick=()=>ejercicios(g,s);
  c.appendChild(b);
 });
 sub.appendChild(c);
}

function ejercicios(g,s){
 rutina.innerHTML="";
 const c=document.createElement("div");
 c.className="card";
 c.innerHTML=`<h3>${s}</h3>`;
 data[g][s].forEach(e=>{
  const d=document.createElement("div");
  d.className="exercise";
  d.innerHTML=`<b>${e}</b><br>
  Series: 4 | Reps: 8–12
  <input placeholder="Peso (kg)">
  `;
  c.appendChild(d);
 });
 rutina.appendChild(c);
}
</script>

</body>
</html>
