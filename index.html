<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraFit – Progreso Fitness</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}
header{
  background:#020617;
  padding:20px;
  text-align:center;
}
select,button,input{
  width:90%;
  max-width:360px;
  padding:14px;
  margin:10px auto;
  display:block;
  border-radius:10px;
  border:none;
  font-size:16px;
}
button{ background:#22c55e; font-weight:bold; }
.card{
  background:#020617;
  margin:15px;
  padding:15px;
  border-radius:14px;
}
.card h3{ color:#22c55e; margin-top:0; }
small{ color:#94a3b8; }
.ad{
  background:#020617;
  border:1px dashed #22c55e;
  color:#94a3b8;
  text-align:center;
  padding:15px;
  margin:15px;
  border-radius:10px;
}
.ad-bottom{
  position:fixed;
  bottom:0; left:0; right:0;
  background:#020617;
  border-top:1px dashed #22c55e;
  padding:10px;
  text-align:center;
  font-size:14px;
}
.completed{
  background:#14532d;
}
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Rutinas + Progreso · Gratis · By Gera</p>
</header>

<div class="ad">📢 Anuncio</div>

<select id="goal">
  <option value="volume">Volumen (30 días)</option>
  <option value="cut">Definición (30 días)</option>
  <option value="strength">Fuerza (42 días)</option>
</select>

<select id="week">
  <option value="A">Semana A</option>
  <option value="B">Semana B</option>
  <option value="C">Semana C</option>
</select>

<button onclick="startPlan()">Iniciar / Continuar Plan</button>

<div id="plan"></div>

<div class="card">
  <h3>📊 Registrar Peso</h3>
  <input id="bodyWeight" placeholder="Peso corporal (kg)">
  <input id="workWeight" placeholder="Peso usado en ejercicios (kg)">
  <button onclick="saveWeight()">Guardar</button>
</div>

<div class="card">
  <h3>📈 Historial</h3>
  <ul id="history"></ul>
</div>

<div class="ad-bottom">📢 Anuncio</div>

<script>
const routines={
  A:{ upper:["Press militar","Laterales","Curl Z","Press francés"],
      pierna:["Sentadilla","Prensa","Extensión","Curl femoral"],
      torso:["Press inclinado","Aperturas","Jalón","Remo"]},
  B:{ upper:["Arnold","Polea lateral","Martillo","Jalón cuerda"],
      pierna:["Hack","Búlgara","Zancadas","PM rumano"],
      torso:["Press banca","Peck fly","Dominadas","Remo barra"]},
  C:{ upper:["Press mancuerna","Face pull","Concentrado","Fondos"],
      pierna:["Sentadilla frontal","Prensa alta","Sissy","Curl sentado"],
      torso:["Declinado","Cristos","Pull over","Hiperextensiones"]}
};

function startPlan(){
  const goal=document.getElementById("goal").value;
  const week=document.getElementById("week").value;
  const days= goal==="strength"?42:30;

  let plan=JSON.parse(localStorage.getItem("gerafitPlan")) || {
    start:new Date().toISOString(),
    goal, days, completed:[]
  };

  localStorage.setItem("gerafitPlan",JSON.stringify(plan));

  document.getElementById("plan").innerHTML=`
  <div class="card ${plan.completed.includes(week)?"completed":""}">
    <h3>📆 Semana ${week}</h3>
    <small>Días restantes: ${days - plan.completed.length*7}</small>
    <ul>
      <li><b>Hombro/Brazo:</b> ${routines[week].upper.join(", ")}</li>
      <li><b>Pierna:</b> ${routines[week].pierna.join(", ")}</li>
      <li><b>Pecho/Espalda:</b> ${routines[week].torso.join(", ")}</li>
    </ul>
    <button onclick="completeWeek('${week}')">✔ Marcar Semana Completada</button>
  </div>`;
}

function completeWeek(week){
  let plan=JSON.parse(localStorage.getItem("gerafitPlan"));
  if(!plan.completed.includes(week)){
    plan.completed.push(week);
    localStorage.setItem("gerafitPlan",JSON.stringify(plan));
    startPlan();
  }
}

function saveWeight(){
  const bw=document.getElementById("bodyWeight").value;
  const ww=document.getElementById("workWeight").value;
  if(!bw || !ww) return;

  let history=JSON.parse(localStorage.getItem("gerafitHistory"))||[];
  history.push({
    date:new Date().toLocaleDateString(),
    bw, ww
  });
  localStorage.setItem("gerafitHistory",JSON.stringify(history));
  loadHistory();
}

function loadHistory(){
  let history=JSON.parse(localStorage.getItem("gerafitHistory"))||[];
  document.getElementById("history").innerHTML=
    history.map(h=>`<li>${h.date} – BW: ${h.bw}kg / W: ${h.ww}kg</li>`).join("");
}

loadHistory();
</script>

</body>
</html>
