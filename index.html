<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraFit – Entrena con Objetivo</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}
header{
  background:#020617;
  padding:20px;
  text-align:center;
}
.card{
  background:#020617;
  margin:15px;
  padding:15px;
  border-radius:14px;
}
h3{ color:#22c55e; margin-top:0; }
button,input,select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:15px;
}
button{
  background:#22c55e;
  font-weight:bold;
}
.exercise{
  border:1px solid #1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
.done{
  background:#14532d;
}
.muscle-btn{
  background:#1e293b;
  margin-bottom:10px;
}
.ad{
  background:#020617;
  border:1px dashed #22c55e;
  text-align:center;
  padding:15px;
  margin:15px;
  border-radius:10px;
}
.hidden{ display:none; }
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Entrena con intención · Progresa con lógica</p>
</header>

<div class="ad">📢 Anuncio</div>

<!-- OBJETIVO -->
<div class="card">
<h3>🎯 Selecciona tu objetivo</h3>
<button onclick="selectGoal('volumen')">🔥 Volumen</button>
<button onclick="selectGoal('definicion')">🩸 Definición</button>
</div>

<!-- DESGLOSE OBJETIVO -->
<div id="goalInfo" class="card hidden"></div>

<!-- SELECCIÓN MÚSCULO -->
<div id="muscles" class="card hidden">
<h3>🏋️ ¿Qué vas a entrenar hoy?</h3>
<button class="muscle-btn" onclick="loadMuscle('pierna')">🦵 Pierna</button>
<button class="muscle-btn" onclick="loadMuscle('pecho')">🧱 Pecho</button>
<button class="muscle-btn" onclick="loadMuscle('espalda')">🦍 Espalda</button>
<button class="muscle-btn" onclick="loadMuscle('hombro')">🧠 Hombro</button>
<button class="muscle-btn" onclick="loadMuscle('brazo')">💪 Brazos</button>
<button class="muscle-btn" onclick="loadMuscle('gluteo')">🍑 Glúteo</button>
</div>

<!-- RUTINA -->
<div id="routine"></div>

<div class="ad">📢 Anuncio</div>

<script>
let profile=JSON.parse(localStorage.getItem("gerafitProfile"))||{};
let progress=JSON.parse(localStorage.getItem("gerafitProgress"))||{};

const exercises={
  pierna:["Sentadilla","Prensa","Extensión","Curl femoral","Pantorrilla"],
  pecho:["Press banca","Press inclinado","Aperturas","Cross over"],
  espalda:["Jalón","Remo barra","Remo mancuerna","Hiperextensiones"],
  hombro:["Press militar","Laterales","Face pull","Posterior"],
  brazo:["Curl Z","Martillo","Press francés","Jalón cuerda"],
  gluteo:["Hip thrust","Sentadilla sumo","Patada polea","Abducciones"]
};

function selectGoal(goal){
  profile.goal=goal;
  localStorage.setItem("gerafitProfile",JSON.stringify(profile));

  const info=document.getElementById("goalInfo");
  info.classList.remove("hidden");

  if(goal==="volumen"){
    info.innerHTML=`
      <h3>🔥 Objetivo: Volumen</h3>
      <p>Hoy entrenas para ganar músculo.</p>
      <ul>
        <li>Reps: 6–12</li>
        <li>Descanso: 90–120s</li>
        <li>Enfoque: Fuerza + Hipertrofia</li>
      </ul>
      <button onclick="showMuscles()">Entrenar hoy</button>
    `;
  }else{
    info.innerHTML=`
      <h3>🩸 Objetivo: Definición</h3>
      <p>Hoy entrenas para quemar grasa y mantener músculo.</p>
      <ul>
        <li>Reps: 12–20</li>
        <li>Descanso: 30–60s</li>
        <li>Enfoque: Densidad + gasto calórico</li>
      </ul>
      <button onclick="showMuscles()">Entrenar hoy</button>
    `;
  }
}

function showMuscles(){
  document.getElementById("muscles").classList.remove("hidden");
}

function getScheme(){
  return profile.goal==="volumen"
    ? {reps:"12-10-8-6",rest:"90s"}
    : {reps:"15-15-12-12",rest:"45s"};
}

function loadMuscle(muscle){
  const scheme=getScheme();
  const container=document.getElementById("routine");
  container.innerHTML="";
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<h3>${muscle.toUpperCase()} – ${profile.goal}</h3>`;

  exercises[muscle].forEach(ex=>{
    const key=muscle+"-"+ex;
    const saved=progress[key]||{};
    const div=document.createElement("div");
    div.className="exercise";
    if(saved.done) div.classList.add("done");

    div.innerHTML=`
      <b>${ex}</b><br>
      Reps: ${scheme.reps} | Descanso: ${scheme.rest}
      <input placeholder="Peso usado (kg)" value="${saved.weight||""}">
      <button>${saved.done?"✔ Completado":"Marcar ejercicio"}</button>
    `;

    const input=div.querySelector("input");
    const btn=div.querySelector("button");

    btn.onclick=()=>{
      progress[key]={done:true,weight:input.value};
      localStorage.setItem("gerafitProgress",JSON.stringify(progress));
      loadMuscle(muscle);
    };

    card.appendChild(div);
  });

  container.appendChild(card);
}
</script>

</body>
</html>
