<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GeraFit – Weekly Gym Routines</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
  margin:0;
  padding:0;
}
header {
  background:#020617;
  padding:20px;
}
select, button {
  padding:12px;
  margin:10px;
  width:90%;
  max-width:340px;
  border-radius:8px;
  border:none;
}
button {
  background:#22c55e;
  font-weight:bold;
}
.day {
  background:#020617;
  margin:15px;
  padding:15px;
  border-radius:12px;
  text-align:left;
}
.day h3 {
  margin-top:0;
  color:#22c55e;
}
footer {
  font-size:12px;
  color:#94a3b8;
  margin:20px;
}
.lock {
  opacity:0.6;
}
</style>
</head>

<body>

<header>
<h1>💪 GeraFit – Weekly Gym Routines</h1>
<p>Smart training plans by Gera</p>
</header>

<select id="mode">
  <option value="basic">Rutina General (Gratis)</option>
  <option value="pro">GeraFit PRO (Avanzado)</option>
</select>

<select id="goal">
  <option value="volume">Volumen</option>
  <option value="cut">Definición</option>
  <option value="strength">Fuerza</option>
</select>

<button onclick="generateRoutine()">Generar Rutina</button>

<div id="result"></div>

<footer>
© 2026 GeraFit – All rights reserved
</footer>

<script>
function generateRoutine() {
  const mode = document.getElementById("mode").value;
  const goal = document.getElementById("goal").value;
  let html = "";

  if (mode === "basic") {
    html = `
    <div class="day">
      <h3>Rutina General</h3>
      <ul>
        <li>Pierna – Sentadilla, Prensa, Extensión</li>
        <li>Pecho – Press banca, Aperturas</li>
        <li>Espalda – Jalón, Remo</li>
        <li>Hombro – Press, Laterales</li>
        <li>Brazo – Curl y Tríceps</li>
      </ul>
      <p class="lock">🔒 Desbloquea GeraFit PRO para rutinas avanzadas</p>
    </div>`;
  }

  if (mode === "pro") {

    const routines = {
      volume: {
        pierna: [
          "Triserie: Sentadilla libre + Leg extension + Sissy (15-12-10-10-8)",
          "Triserie 21’s: Hack + Desplantes + Sentadilla libre",
          "Biserie: Curl femoral + Peso muerto mancuerna (12-10)",
          "Pantorrilla: Smith + Prensa + Costurera (4x25)"
        ],
        hombroBrazo: [
          "Biserie: Press militar barra + mancuerna (15-12-10-8-8)",
          "Triserie: Arnold + Laterales + Flies invertidos (15-12-10-8-8)",
          "Triserie Bíceps: Curl Z + Mancuerna 2 pos + Concentrado (15-12-10-8-8)",
          "Triserie Tríceps: Francés + Patada + Polea (15-12-10-10-8)"
        ],
        pechoEspalda: [
          "Triserie Pecho: Press inclinado barra + Mancuerna + Crossover",
          "Triserie Pecho: Cristos inclinados + Press plano + Peck fly",
          "Triserie Espalda: Jalones + Remo piso + Mancuerna",
          "Triserie Espalda: Hammer + Remo barra + Mancuerna",
          "Finisher: Hiperextensiones 4x30"
        ]
      },

      cut: {
        pierna: [
          "Biserie: Zancadas caminando + Extensión (4x20)",
          "Circuito: Prensa + Curl femoral + Pantorrilla (3 vueltas)",
          "Isométricos finales"
        ],
        hombroBrazo: [
          "Superserie: Press mancuerna + Laterales (4x15)",
          "Triserie Bíceps: Curl polea + Martillo + Concentrado (15-15-12)",
          "Triserie Tríceps: Jalón cuerda + Fondos + Extensión (15-15-12)"
        ],
        pechoEspalda: [
          "Superserie: Press inclinado + Flexiones",
          "Triserie Espalda: Jalón + Remo + Pull over",
          "Cardio final 15–20 min"
        ]
      },

      strength: {
        pierna: [
          "Sentadilla libre 5x5",
          "Hack squat 4x6",
          "Peso muerto rumano 4x6",
          "Pantorrilla pesada 4x12"
        ],
        hombroBrazo: [
          "Press militar barra 5x5",
          "Curl barra 4x6",
          "Press cerrado 4x6"
        ],
        pechoEspalda: [
          "Press banca 5x5",
          "Dominadas lastradas 4x6",
          "Remo barra 4x6"
        ]
      }
    };

    html += `
    <div class="day">
      <h3>Lunes / Jueves – Hombro + Brazo (${goal.toUpperCase()})</h3>
      <ul>${routines[goal].hombroBrazo.map(e => `<li>${e}</li>`).join("")}</ul>
    </div>

    <div class="day">
      <h3>Martes / Viernes – Pierna (${goal.toUpperCase()})</h3>
      <ul>${routines[goal].pierna.map(e => `<li>${e}</li>`).join("")}</ul>
    </div>

    <div class="day">
      <h3>Miércoles / Sábado – Pecho + Espalda (${goal.toUpperCase()})</h3>
      <ul>${routines[goal].pechoEspalda.map(e => `<li>${e}</li>`).join("")}</ul>
    </div>`;
  }

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
