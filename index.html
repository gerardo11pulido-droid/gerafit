<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraFit – Entrena con Objetivo</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}
header{
  background:#020617;
  padding:20px;
  text-align:center;
}
.card{
  background:#020617;
  margin:15px;
  padding:15px;
  border-radius:14px;
}
h3{ color:#22c55e; margin-top:0; }
button,input,select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:15px;
}
button{
  background:#22c55e;
  font-weight:bold;
}
.exercise{
  border:1px solid #1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
.done{
  background:#14532d;
}
.muscle-btn{
  background:#1e293b;
  margin-bottom:10px;
}
.hidden{ display:none; }
.ad{
  background:#020617;
  border:1px dashed #22c55e;
  text-align:center;
  padding:15px;
  margin:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Entrena con intención · Progresa con lógica</p>
</header>

<div class="ad">📢 Anuncio</div>

<!-- OBJETIVO -->
<div class="card">
<h3>🎯 Selecciona tu objetivo</h3>
<button onclick="selectGoal('volumen')">🔥 Volumen</button>
<button onclick="selectGoal('definicion')">🩸 Definición</button>
</div>

<!-- NIVEL -->
<div id="levelBox" class="card hidden">
<h3>📈 Selecciona tu nivel</h3>
<button onclick="selectLevel('novato')">🟢 Novato</button>
<button onclick="selectLevel('intermedio')">🟡 Intermedio</button>
<button onclick="selectLevel('avanzado')">🔴 Avanzado</button>
</div>

<!-- INFO OBJETIVO -->
<div id="goalInfo" class="card hidden"></div>

<!-- MUSCULOS -->
<div id="muscles" class="card hidden">
<h3>🏋️ ¿Qué vas a entrenar hoy?</h3>
<button class="muscle-btn" onclick="loadMuscle('pierna')">🦵 Pierna</button>
<button class="muscle-btn" onclick="loadMuscle('pecho')">🧱 Pecho</button>
<button class="muscle-btn" onclick="loadMuscle('espalda')">🦍 Espalda</button>
<button class="muscle-btn" onclick="loadMuscle('hombro')">🧠 Hombro</button>
<button class="muscle-btn" onclick="loadMuscle('brazo')">💪 Brazos</button>
<button class="muscle-btn" onclick="loadMuscle('gluteo')">🍑 Glúteo</button>
</div>

<div id="routine"></div>

<div class="ad">📢 Anuncio</div>

<script>
let profile=JSON.parse(localStorage.getItem("gerafitProfile"))||{};
let progress=JSON.parse(localStorage.getItem("gerafitProgress"))||{};

const exercises={
  pierna:{
    novato:["Prensa","Extensión","Curl femoral","Pantorrilla"],
    intermedio:["Sentadilla","Prensa","Curl femoral","Zancadas"],
    avanzado:["Sentadilla libre","Hack","Búlgara","Peso muerto"]
  },
  pecho:{
    novato:["Press máquina","Press inclinado","Aperturas"],
    intermedio:["Press banca","Press inclinado","Cross over"],
    avanzado:["Press banca pesado","Press inclinado barra","Fondos"]
  },
  espalda:{
    novato:["Jalón","Remo máquina","Pullover"],
    intermedio:["Dominadas asistidas","Remo barra","Jalón cerrado"],
    avanzado:["Dominadas","Remo barra pesado","Peso muerto"]
  },
  hombro:{
    novato:["Press máquina","Laterales","Posterior"],
    intermedio:["Press militar","Laterales","Face pull"],
    avanzado:["Press militar barra","Laterales pesadas","Remo al mentón"]
  },
  brazo:{
    novato:["Curl mancuerna","Curl polea","Jalón cuerda"],
    intermedio:["Curl Z","Martillo","Press francés"],
    avanzado:["Curl barra pesado","Fondos","Extensión overhead"]
  },
  gluteo:{
    novato:["Hip thrust máquina","Abducciones","Puente"],
    intermedio:["Hip thrust","Sentadilla sumo","Patada polea"],
    avanzado:["Hip thrust pesado","Búlgara","Peso muerto sumo"]
  }
};

function selectGoal(goal){
  profile.goal=goal;
  localStorage.setItem("gerafitProfile",JSON.stringify(profile));
  document.getElementById("levelBox").classList.remove("hidden");

  const info=document.getElementById("goalInfo");
  info.classList.remove("hidden");
  info.innerHTML= goal==="volumen"
    ? `<h3>🔥 Volumen</h3><p>Más peso · Más descanso · Más músculo</p>`
    : `<h3>🩸 Definición</h3><p>Más reps · Menos descanso · Más gasto</p>`;
}

function selectLevel(level){
  profile.level=level;
  localStorage.setItem("gerafitProfile",JSON.stringify(profile));
  document.getElementById("muscles").classList.remove("hidden");
}

function getScheme(){
  if(profile.goal==="volumen"){
    return {reps:"12-10-8-6",rest:"90s"};
  }else{
    return {reps:"15-15-12-12",rest:"45s"};
  }
}

function loadMuscle(muscle){
  const scheme=getScheme();
  const list=exercises[muscle][profile.level];
  const container=document.getElementById("routine");
  container.innerHTML="";
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<h3>${muscle.toUpperCase()} · ${profile.level}</h3>`;

  list.forEach(ex=>{
    const key=muscle+"-"+ex;
    const saved=progress[key]||{};
    const div=document.createElement("div");
    div.className="exercise";
    if(saved.done) div.classList.add("done");

    div.innerHTML=`
      <b>${ex}</b><br>
      Reps: ${scheme.reps} | Descanso: ${scheme.rest}
      <input placeholder="Peso usado (kg)" value="${saved.weight||""}">
      <button>${saved.done?"✔ Completado":"Marcar ejercicio"}</button>
    `;

    const input=div.querySelector("input");
    const btn=div.querySelector("button");

    btn.onclick=()=>{
      progress[key]={done:true,weight:input.value};
      localStorage.setItem("gerafitProgress",JSON.stringify(progress));
      loadMuscle(muscle);
    };

    card.appendChild(div);
  });

  container.appendChild(card);
}
</script>

</body>
</html>
