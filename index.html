<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraFit</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}
header{
  background:#020617;
  padding:20px;
  text-align:center;
}
.card{
  background:#020617;
  margin:15px;
  padding:15px;
  border-radius:14px;
}
h3{ color:#22c55e; margin-top:0; }
button,input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:15px;
}
button{
  background:#22c55e;
  font-weight:bold;
}
.exercise{
  border:1px solid #1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
.done{ background:#14532d; }
.muscle-btn{ background:#1e293b; }
.ad{
  background:#020617;
  border:1px dashed #22c55e;
  text-align:center;
  padding:15px;
  margin:15px;
  border-radius:10px;
}
small{ color:#94a3b8; }
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Entrena con objetivo · Progresa con lógica</p>
</header>

<div class="ad">📢 Anuncio</div>

<!-- OBJETIVO -->
<div class="card">
<h3>🎯 Objetivo</h3>
<button onclick="setGoal('volumen')">🔥 Volumen</button>
<button onclick="setGoal('definicion')">🩸 Definición</button>
<small id="goalText"></small>
</div>

<!-- PERFIL -->
<div class="card">
<h3>👤 Tu perfil</h3>
<input id="currentWeight" placeholder="Peso actual (kg)">
<input id="height" placeholder="Estatura (cm)">
<input id="targetWeight" placeholder="Peso objetivo (kg)">
<button onclick="saveProfile()">Guardar perfil</button>
<small id="profileText"></small>
</div>

<!-- NIVEL -->
<div class="card">
<h3>📈 Nivel</h3>
<button onclick="setLevel('novato')">🟢 Novato</button>
<button onclick="setLevel('intermedio')">🟡 Intermedio</button>
<button onclick="setLevel('avanzado')">🔴 Avanzado</button>
<small id="levelText"></small>
</div>

<!-- MUSCULOS -->
<div class="card">
<h3>🏋️ ¿Qué entrenas hoy?</h3>
<button class="muscle-btn" onclick="loadMuscle('pierna')">Pierna</button>
<button class="muscle-btn" onclick="loadMuscle('pecho')">Pecho</button>
<button class="muscle-btn" onclick="loadMuscle('espalda')">Espalda</button>
<button class="muscle-btn" onclick="loadMuscle('hombro')">Hombro</button>
<button class="muscle-btn" onclick="loadMuscle('brazo')">Brazos</button>
<button class="muscle-btn" onclick="loadMuscle('gluteo')">Glúteo</button>
</div>

<div id="routine"></div>

<div class="ad">📢 Anuncio</div>

<script>
let profile = JSON.parse(localStorage.getItem("gerafitProfile")) || {};
let progress = JSON.parse(localStorage.getItem("gerafitProgress")) || {};

const exercises = {
  pierna:{
    novato:["Prensa","Extensión","Curl femoral"],
    intermedio:["Sentadilla","Prensa","Zancadas"],
    avanzado:["Sentadilla libre","Hack","Peso muerto"]
  },
  pecho:{
    novato:["Press máquina","Aperturas"],
    intermedio:["Press banca","Press inclinado"],
    avanzado:["Press banca pesado","Fondos"]
  },
  espalda:{
    novato:["Jalón","Remo máquina"],
    intermedio:["Remo barra","Jalón cerrado"],
    avanzado:["Dominadas","Peso muerto"]
  },
  hombro:{
    novato:["Press máquina","Laterales"],
    intermedio:["Press militar","Face pull"],
    avanzado:["Press militar barra","Laterales pesadas"]
  },
  brazo:{
    novato:["Curl mancuerna","Jalón cuerda"],
    intermedio:["Curl Z","Press francés"],
    avanzado:["Curl pesado","Fondos"]
  },
  gluteo:{
    novato:["Puente","Abducciones"],
    intermedio:["Hip thrust","Sumo"],
    avanzado:["Hip thrust pesado","Búlgara"]
  }
};

function setGoal(goal){
  profile.goal = goal;
  localStorage.setItem("gerafitProfile", JSON.stringify(profile));
  document.getElementById("goalText").innerText =
    `Objetivo seleccionado: ${goal}`;
}

function saveProfile(){
  profile.current = document.getElementById("currentWeight").value;
  profile.height = document.getElementById("height").value;
  profile.target = document.getElementById("targetWeight").value;
  localStorage.setItem("gerafitProfile", JSON.stringify(profile));
  document.getElementById("profileText").innerText =
    `Perfil guardado ✔`;
}

function setLevel(level){
  profile.level = level;
  localStorage.setItem("gerafitProfile", JSON.stringify(profile));
  document.getElementById("levelText").innerText =
    `Nivel: ${level}`;
}

function getScheme(){
  return profile.goal === "volumen"
    ? { reps:"12-10-8", rest:"90s" }
    : { reps:"15-15-12", rest:"45s" };
}

function loadMuscle(muscle){
  if(!profile.goal || !profile.level){
    alert("Selecciona objetivo y nivel primero");
    return;
  }

  const scheme = getScheme();
  const list = exercises[muscle][profile.level];
  const container = document.getElementById("routine");
  container.innerHTML = "";

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<h3>${muscle.toUpperCase()}</h3>`;

  list.forEach(ex=>{
    const key = muscle + "-" + ex;
    const saved = progress[key] || {};
    const div = document.createElement("div");
    div.className = "exercise";
    if(saved.done) div.classList.add("done");

    div.innerHTML = `
      <b>${ex}</b><br>
      Reps: ${scheme.reps} | Descanso: ${scheme.rest}
      <input placeholder="Peso usado (kg)" value="${saved.weight||""}">
      <button>${saved.done ? "✔ Completado" : "Marcar"}</button>
    `;

    const input = div.querySelector("input");
    const btn = div.querySelector("button");

    btn.onclick = ()=>{
      progress[key] = { done:true, weight:input.value };
      localStorage.setItem("gerafitProgress", JSON.stringify(progress));
      loadMuscle(muscle);
    };

    card.appendChild(div);
  });

  container.appendChild(card);
}
</script>

</body>
</html>
