<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraFit</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
header{background:#020617;padding:20px;text-align:center}
.card{background:#020617;margin:15px;padding:15px;border-radius:14px}
h3{color:#22c55e;margin-top:0}
button,input{
  width:100%;padding:12px;margin-top:8px;
  border-radius:10px;border:none;font-size:15px
}
button{background:#22c55e;font-weight:bold}
.sub{background:#1e293b}
.exercise{
  border:1px solid #1e293b;
  padding:10px;border-radius:10px;margin-top:10px
}
.done{background:#14532d}
.ad{border:1px dashed #22c55e;margin:15px;padding:15px;text-align:center}
small{color:#94a3b8}
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Entrena por partes · Progresa real</p>
</header>

<div class="ad">📢 Anuncio</div>

<!-- OBJETIVO -->
<div class="card">
<h3>🎯 Objetivo</h3>
<button onclick="setGoal('volumen')">Volumen</button>
<button onclick="setGoal('definicion')">Definición</button>
<small id="goalText"></small>
</div>

<!-- PERFIL -->
<div class="card">
<h3>👤 Perfil</h3>
<input id="pesoActual" placeholder="Peso actual (kg)">
<input id="estatura" placeholder="Estatura (cm)">
<input id="pesoObjetivo" placeholder="Peso objetivo (kg)">
<button onclick="saveProfile()">Guardar perfil</button>
<small id="profileText"></small>
</div>

<!-- NIVEL -->
<div class="card">
<h3>📈 Nivel</h3>
<button onclick="setLevel('novato')">Novato</button>
<button onclick="setLevel('intermedio')">Intermedio</button>
<button onclick="setLevel('avanzado')">Avanzado</button>
<small id="levelText"></small>
</div>

<!-- MUSCULO -->
<div class="card">
<h3>🏋️ ¿Qué entrenas hoy?</h3>
<button onclick="chooseMuscle('pierna')">Pierna</button>
<button onclick="chooseMuscle('pecho')">Pecho</button>
<button onclick="chooseMuscle('espalda')">Espalda</button>
<button onclick="chooseMuscle('hombro')">Hombro</button>
<button onclick="chooseMuscle('brazo')">Brazos</button>
</div>

<div id="step2"></div>
<div id="step3"></div>

<div class="ad">📢 Anuncio</div>

<script>
let profile = JSON.parse(localStorage.getItem("gerafitProfile")) || {};
let progress = JSON.parse(localStorage.getItem("gerafitProgress")) || {};

const routines = {
  pierna:{
    "Cuádriceps":{
      novato:["Prensa","Extensión","Goblet squat"],
      intermedio:["Sentadilla barra","Hack squat","Prensa pies cerrados"],
      avanzado:["Sentadilla libre profunda","Hack pies bajos","Sissy squat","Extensión con pausa"]
    },
    "Femoral":{
      novato:["Curl acostado"],
      intermedio:["Curl sentado","Peso muerto rumano"],
      avanzado:["Peso muerto rumano pesado","Curl nórdico","Buenos días"]
    },
    "Glúteo":{
      novato:["Puente de glúteo"],
      intermedio:["Hip thrust","Sentadilla sumo"],
      avanzado:["Hip thrust pesado","Búlgara","Peso muerto sumo"]
    },
    "Pantorrilla":{
      novato:["Elevaciones de pie"],
      intermedio:["Pantorrilla en prensa"],
      avanzado:["Smith pesado","Unilateral"]
    }
  },
  pecho:{
    "Superior":{
      novato:["Press inclinado máquina"],
      intermedio:["Press inclinado barra","Mancuerna"],
      avanzado:["Press inclinado pesado","Aperturas inclinadas"]
    },
    "Medio":{
      novato:["Press máquina"],
      intermedio:["Press banca"],
      avanzado:["Press banca pesado","Fondos"]
    }
  },
  espalda:{
    "Dorsal":{
      novato:["Jalón al pecho"],
      intermedio:["Dominadas asistidas","Jalón cerrado"],
      avanzado:["Dominadas estrictas","Lastradas","Pullover"]
    },
    "Media":{
      novato:["Remo máquina"],
      intermedio:["Remo barra","Mancuerna"],
      avanzado:["Remo Pendlay","Remo T"]
    }
  },
  hombro:{
    "Frontal":{
      novato:["Press máquina"],
      intermedio:["Press militar"],
      avanzado:["Press militar barra","Push press"]
    },
    "Lateral":{
      novato:["Laterales"],
      intermedio:["Laterales inclinadas"],
      avanzado:["Laterales pesadas","Drop set"]
    }
  },
  brazo:{
    "Bíceps":{
      novato:["Curl mancuerna"],
      intermedio:["Curl Z","Inclinado"],
      avanzado:["Curl pesado","21s","Araña"]
    },
    "Tríceps":{
      novato:["Jalón cuerda"],
      intermedio:["Press francés"],
      avanzado:["Fondos","Rompecráneos","Extensión unilateral"]
    }
  }
};

function setGoal(g){
  profile.goal=g;
  save();
  goalText.innerText="Objetivo: "+g;
}
function setLevel(l){
  profile.level=l;
  save();
  levelText.innerText="Nivel: "+l;
}
function saveProfile(){
  profile.peso=pesoActual.value;
  profile.estatura=estatura.value;
  profile.objetivo=pesoObjetivo.value;
  save();
  profileText.innerText="Perfil guardado ✔";
}
function save(){
  localStorage.setItem("gerafitProfile",JSON.stringify(profile));
}
function scheme(){
  return profile.goal==="volumen"
    ? {r:"12-10-8",d:"90s"}
    : {r:"15-12-12",d:"45s"};
}
function chooseMuscle(m){
  if(!profile.goal||!profile.level){
    alert("Selecciona objetivo y nivel");
    return;
  }
  step2.innerHTML="";
  step3.innerHTML="";
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML="<h3>¿Qué parte?</h3>";
  Object.keys(routines[m]).forEach(p=>{
    const b=document.createElement("button");
    b.className="sub";
    b.innerText=p;
    b.onclick=()=>loadExercises(m,p);
    card.appendChild(b);
  });
  step2.appendChild(card);
}
function loadExercises(m,p){
  step3.innerHTML="";
  const sc=scheme();
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<h3>${p}</h3>`;
  routines[m][p][profile.level].forEach(ex=>{
    const key=m+p+ex;
    const saved=progress[key]||{};
    const div=document.createElement("div");
    div.className="exercise"+(saved.done?" done":"");
    div.innerHTML=`
      <b>${ex}</b><br>
      Reps: ${sc.r} | Descanso: ${sc.d}
      <input placeholder="Peso (kg)" value="${saved.w||""}">
      <button>${saved.done?"✔":"Marcar"}</button>
    `;
    div.querySelector("button").onclick=()=>{
      progress[key]={done:true,w:div.querySelector("input").value};
      localStorage.setItem("gerafitProgress",JSON.stringify(progress));
      loadExercises(m,p);
    };
    card.appendChild(div);
  });
  step3.appendChild(card);
}
</script>

</body>
</html>
