<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraFit – Rutinas Inteligentes</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}
header{
  background:#020617;
  padding:20px;
  text-align:center;
}
select,button{
  width:90%;
  max-width:360px;
  padding:14px;
  margin:10px auto;
  display:block;
  border-radius:10px;
  border:none;
  font-size:16px;
}
button{
  background:#22c55e;
  font-weight:bold;
}
.card{
  background:#020617;
  margin:15px;
  padding:15px;
  border-radius:14px;
}
.card h3{
  color:#22c55e;
  margin-top:0;
}
small{
  color:#94a3b8;
}
footer{
  text-align:center;
  font-size:12px;
  color:#94a3b8;
  margin:60px 20px 80px;
}
.ad{
  background:#020617;
  border:1px dashed #22c55e;
  color:#94a3b8;
  text-align:center;
  padding:15px;
  margin:15px;
  border-radius:10px;
}
.ad-bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  margin:0;
  border-radius:0;
}
</style>
</head>

<body>

<header>
<h1>💪 GeraFit</h1>
<p>Rutinas inteligentes · Gratis · By Gera</p>
</header>

<div class="ad">📢 Anuncio</div>

<select id="goal">
  <option value="volume">Volumen</option>
  <option value="cut">Definición</option>
  <option value="strength">Fuerza</option>
</select>

<select id="level">
  <option value="beginner">Principiante</option>
  <option value="intermediate">Intermedio</option>
  <option value="advanced">Avanzado</option>
</select>

<button onclick="generate()">Generar Rutina</button>

<div id="result"></div>

<div class="ad-bottom">📢 Anuncio</div>

<footer>
© 2026 GeraFit · Gratis · Monetizado con anuncios
</footer>

<script>
const week=["A","B","C"][Math.floor(Math.random()*3)];

function generate(){
  const goal=document.getElementById("goal").value;
  const level=document.getElementById("level").value;
  let html="";

  const context={
    volume:"Descanso 60–90s · Duración 6–8 semanas",
    cut:"Descanso 30–45s · Duración 4–6 semanas",
    strength:"Descanso 2–3 min · Duración 6 semanas"
  };

  const data={
    volume:{
      pierna:[
        "Triserie: Sentadilla + Extensión + Sissy",
        "Hack 21’s + Desplantes",
        "Curl femoral + Peso muerto mancuerna",
        "Pantorrilla Smith + Prensa"
      ],
      upper:[
        "Press militar barra + mancuerna",
        "Arnold + Laterales + Invertidos",
        "Curl Z + Mancuerna + Concentrado",
        "Francés + Patada + Polea"
      ],
      torso:[
        "Press inclinado barra + Mancuerna + Crossover",
        "Cristos + Press plano + Peck fly",
        "Jalón + Remo + Mancuerna",
        "Hiperextensiones 4x30"
      ]
    },
    cut:{
      pierna:[
        "Zancadas caminando + Extensión",
        "Circuito Prensa / Curl / Pantorrilla",
        "Isométricos finales"
      ],
      upper:[
        "Press mancuerna + Laterales",
        "Curl polea + Martillo",
        "Jalón cuerda + Fondos"
      ],
      torso:[
        "Press inclinado + Flexiones",
        "Jalón + Remo + Pull over",
        "Cardio 20 min"
      ]
    },
    strength:{
      pierna:[
        "Sentadilla 5x5",
        "Hack squat 4x6",
        "Peso muerto rumano 4x6",
        "Pantorrilla pesada"
      ],
      upper:[
        "Press militar 5x5",
        "Curl barra 4x6",
        "Press cerrado 4x6"
      ],
      torso:[
        "Press banca 5x5",
        "Dominadas 4x6",
        "Remo barra 4x6"
      ]
    }
  };

  html+=`
  <div class="card">
    <h3>📆 Semana ${week}</h3>
    <small>${context[goal]} · Nivel ${level}</small>
  </div>

  <div class="card">
    <h3>Lunes / Jueves – Hombro + Brazo</h3>
    <ul>${data[goal].upper.map(e=>`<li>${e}</li>`).join("")}</ul>
  </div>

  <div class="ad">📢 Anuncio</div>

  <div class="card">
    <h3>Martes / Viernes – Pierna</h3>
    <ul>${data[goal].pierna.map(e=>`<li>${e}</li>`).join("")}</ul>
  </div>

  <div class="ad">📢 Anuncio</div>

  <div class="card">
    <h3>Miércoles / Sábado – Pecho + Espalda</h3>
    <ul>${data[goal].torso.map(e=>`<li>${e}</li>`).join("")}</ul>
  </div>
  `;

  document.getElementById("result").innerHTML=html;
}
</script>

</body>
</html>
